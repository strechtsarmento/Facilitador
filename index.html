<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facilitador</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <h1>Facilitador</h1>
    <p>Escolha o que você vai “facilitar” hoje</p>
  </header>

  <main class="container">

    <section class="grid">

      <div class="card large" onclick="abrir('antesDepois')">
        <h2>📸 Antes e Depois</h2>
        <p>Compare imagens com precisão cirúrgica (ou quase isso).</p>
      </div>

      <div class="card" onclick="abrir('galeria')">
        <h3>🖼️ Galeria</h3>
        <p>Suas imagens salvas</p>
      </div>

      <div class="card small" onclick="abrir('upload')">
        <h3>⬆️ Upload</h3>
      </div>

      <div class="card tall" onclick="abrir('config')">
        <h3>⚙️ Config</h3>
        <p>Ajustes do sistema</p>
      </div>

      <div class="card" onclick="abrir('historico')">
        <h3>🕓 Histórico</h3>
        <p>Suas ações recentes</p>
      </div>

    </section>

    <section id="view" class="view">
      <p>Selecione um card acima 👆</p>
    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
