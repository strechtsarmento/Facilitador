<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Facilitador Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="tela-inicial">
    <header class="topbar">
      <h1>Facilitador</h1>
      <p>Escolha o que você vai “facilitar” hoje</p>
    </header>

    <main class="container">
      <section class="grid">
        
        <div class="card large" style="background: linear-gradient(145deg, #1c1c1e 0%, #15151f 100%); border-color: #4ea8de;" onclick="abrir('seusDados')">
          <div class="card-icon">📊</div>
          <h2>Seus Dados</h2>
          <div class="progress-container">
            <div class="progress-bar-fill" id="dashboard-progress-fill" style="width: 0%;"></div>
          </div>
          <p id="dashboard-progress-text" style="color: #4ea8de; margin-top: 8px; font-weight: 600;">Preencha para calcular o seu progresso</p>
        </div>

        <div class="card large" onclick="abrir('antesDepois')">
          <div class="card-icon">📸</div>
          <h2>Antes e Depois</h2>
          <p>Compare imagens com precisão cirúrgica por etapas.</p>
        </div>

        <div class="card" onclick="abrir('galeria')">
          <div class="card-icon">🖼️</div>
          <h3>Galeria</h3>
          <p>Suas imagens salvas</p>
        </div>

        <div class="card small" onclick="abrir('upload')">
          <div class="card-icon">⬆️</div>
          <h3>Upload</h3>
        </div>

        <div class="card tall" onclick="abrir('config')">
          <div class="card-icon">⚙️</div>
          <h3>Config</h3>
          <p>Ajustes do sistema</p>
        </div>

        <div class="card" onclick="abrir('historico')">
          <div class="card-icon">🕓</div>
          <h3>Histórico</h3>
          <p>Suas ações recentes</p>
        </div>
      </section>
    </main>
  </div>

  <div id="tela-modulo" class="hidden">
    <header class="topbar-modulo">
      <button class="btn-voltar" onclick="voltarParaMenu(true)">⬅️ Voltar</button>
      <h2 id="titulo-modulo">Módulo</h2>
    </header>

    <main class="container">
      <section id="view" class="view-completa"></section>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
